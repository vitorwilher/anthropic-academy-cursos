name: Publicar slides (Quarto → GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Renderizar os decks
        run: |
          for d in \
            slides/claude-101 \
            slides/claude-code-101 \
            slides/claude-platform-101 \
            slides/introduction-to-mcp \
            slides/mcp-advanced-topics \
            slides/building-with-claude-api \
            slides/agent-skills \
            slides/subagents \
            slides/ai-fluency \
            slides/claude-cowork \
            slides/claude-code-in-action \
            slides/ai-capabilities-and-limitations \
            projetos/sentimento-copom; do
            echo "::group::Render $d"
            quarto render "$d/slides.qmd"
            echo "::endgroup::"
          done

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
